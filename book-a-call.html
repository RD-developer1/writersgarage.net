<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK A CALL - Writers Garage</title>
    <style>
        /* Core styles for layout */
        body {
            font-family: Montserrat, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        .header {
            background: #fff;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .header-logo {
            max-width: 150px;
        }
        
        .page-title {
            background: #f8f9fa;
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
        }
        
        .page-title h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
        }
        
        .booking-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .booking-iframe {
            width: 100%;
            height: 650px;
            border: none;
        }
        
        .footer {
            background: #333;
            color: #fff;
            padding: 2rem 1rem;
            margin-top: 3rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/">
                <img src="../wp-content/uploads/2019/06/logo_transparent.png" alt="Writers Garage" class="header-logo">
            </a>
        </div>
    </header>

    <div class="page-title">
        <div class="container">
            <h1>Book a Call</h1>
            <p>Discuss your project or have a chat with Gianni!</p>
        </div>
    </div>

    <div class="booking-container">
        <iframe src="https://app.simplymeet.me/writers-garage?view=compact" class="booking-iframe"></iframe>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Writers' Garage. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
