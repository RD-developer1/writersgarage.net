<!DOCTYPE html>
<html lang="en-US" class="loading-site no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian - Writers Garage</title>
    <meta name='robots' content='noindex, nofollow' />
    <style>
        /* Core Styles */
        :root {
            --primary-color: #ffce2d;
            --fs-color-primary: #ffce2d;
            --fs-color-secondary: #193f64;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        /* Header Styles */
        .header {
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            z-index: 999;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo img {
            max-height: 60px;
        }

        /* Navigation */
        .nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            color: #333;
            text-decoration: none;
            padding: 0.5rem 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        /* Main Content */
        .main-content {
            padding-top: 80px;
            min-height: calc(100vh - 300px);
        }

        .author-area {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        /* Footer */
        .footer {
            background: #333;
            color: #fff;
            padding: 3rem 0;
        }

        .footer-widgets {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            padding: 0 2rem;
        }

        .widget {
            margin-bottom: 2rem;
        }

        .widget-title {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                padding: 1rem;
            }

            .nav {
                flex-direction: column;
                width: 100%;
                text-align: center;
            }

            .footer-widgets {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .footer-widgets {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <a href="/">
                    <img src="/wp-content/uploads/2019/06/logo_transparent.png" alt="Writers Garage">
                </a>
            </div>
            <nav>
                <ul class="nav">
                    <li><a href="/" class="nav-link">Home</a></li>
                    <li><a href="/book-a-call/" class="nav-link">Book a Call</a></li>
                    <li><a href="/services/" class="nav-link">Services</a></li>
                    <li><a href="/blog/" class="nav-link">Blog</a></li>
                    <li><a href="/contact/" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="author-area">
            <div class="author-profile">
                <h2>Author Details Not Found</h2>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-widgets">
            <div class="widget">
                <h3 class="widget-title">Useful Links</h3>
                <ul>
                    <li><a href="/about/">About Us</a></li>
                    <li><a href="/services/">Services</a></li>
                    <li><a href="/blog/">Blog</a></li>
                </ul>
            </div>
            <div class="widget">
                <h3 class="widget-title">Contact Us</h3>
                <p>Writers Garage<br>
                Email: support@writersgarage.net</p>
            </div>
            <div class="widget">
                <h3 class="widget-title">Newsletter</h3>
                <form class="newsletter-form">
                    <input type="email" placeholder="Your email address">
                    <button type="submit">Subscribe</button>
                </form>
            </div>
            <div class="widget">
                <h3 class="widget-title">Follow Us</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/WritersGarage/" target="_blank">Facebook</a>
                </div>
            </div>
        </div>
        <div class="copyright">
            <p>Copyright 2024 © Writers' Garage</p>
        </div>
    </footer>

    <script>
        // Remove no-js class
        document.documentElement.className = document.documentElement.className.replace('no-js', 'js');

        // Simple mobile menu toggle
        document.addEventListener('DOMContentLoaded', function() {
            const nav = document.querySelector('.nav');
            const mobileMenuBtn = document.createElement('button');
            mobileMenuBtn.className = 'mobile-menu-toggle';
            mobileMenuBtn.innerHTML = '☰';
            
            if (window.innerWidth <= 768) {
                nav.style.display = 'none';
                document.querySelector('.header-inner').prepend(mobileMenuBtn);
                
                mobileMenuBtn.addEventListener('click', function() {
                    nav.style.display = nav.style.display === 'none' ? 'flex' : 'none';
                });
            }
        });

        // Newsletter form handling
        const newsletterForm = document.querySelector('.newsletter-form');
        if (newsletterForm) {
            newsletterForm.addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Thank you for subscribing to our newsletter!');
                this.reset();
            });
        }
    </script>
</body>
</html>
